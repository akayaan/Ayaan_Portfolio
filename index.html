    const Resume = () => (
      <section className="relative">
        <div className="max-w-4xl mx-auto px-6 text-center mt-12">
          <img src="./Images/mini_kratos.png" alt="Mini Kratos" className="w-16 h-16 mx-auto mb-6 rounded-full border-2 border-white object-cover shadow-[0_0_20px_rgba(255,255,255,0.5)]" />
          <h2 className="font-display text-4xl font-bold mb-6">Detailed Curriculum Vitae</h2>

    const Footer = () => (
      <footer className="py-8 mt-auto border-t border-white/10 text-center text-gray-600 text-sm">
        <p>© {new Date().getFullYear()} Ayaan Khan. Crafted with passion.</p>
      </footer>
    );

    function App() {
      const [currentPage, setCurrentPage] = useState('home');
      const [isMusicPlaying, setIsMusicPlaying] = useState(false);

      const audioRef = React.useRef(null);

      // Play aggressively on any user interaction if standard autoplay is blocked
      React.useEffect(() => {
        const events = ['click', 'touchstart'];
        let isAttemptingToPlay = false;
        
        const handleInteraction = () => {
          if (audioRef.current && audioRef.current.paused && !isAttemptingToPlay) {
             isAttemptingToPlay = true;
             audioRef.current.volume = 0.15;
             audioRef.current.play().then(() => {
               // Remove listeners once successfully playing
               events.forEach(evt => document.removeEventListener(evt, handleInteraction));
               setIsMusicPlaying(true);
             }).catch(() => {
                 isAttemptingToPlay = false;
             });
          }
        };

        // Attempt to play immediately first
        if (audioRef.current && audioRef.current.paused) {
            isAttemptingToPlay = true;
            audioRef.current.volume = 0.15;
            audioRef.current.play().catch(() => {
                isAttemptingToPlay = false;
            });
        }

        events.forEach(evt => document.addEventListener(evt, handleInteraction, { passive: true }));
        
        return () => {
          events.forEach(evt => document.removeEventListener(evt, handleInteraction));
        };
      }, []);

      // Audio elements
      const swooshSound = React.useMemo(() => new Audio('https://actions.google.com/sounds/v1/science_fiction/fast_flyby.ogg'), []);
      const activitySounds = React.useMemo(() => ({
        home: new Audio('https://actions.google.com/sounds/v1/ambiences/city_street_traffic.ogg'), 
        about: new Audio('./hey_its_me_goku.mp3'), 
        games: new Audio('./dr_stone.mp3'), 
        extras: new Audio('./gojo.mp3'), 
        resume: new Audio('./i_will_have_my_revenge.mp3'),
        resume_crash: new Audio('https://actions.google.com/sounds/v1/impacts/crash.ogg')
      }), []);

      // Global UI sounds
      React.useEffect(() => {
        const hoverSound = new Audio('https://actions.google.com/sounds/v1/ui/beep_short.ogg');
        hoverSound.volume = 0.05; 
        
        const clickSound = new Audio('https://actions.google.com/sounds/v1/ui/button_click.ogg');
        clickSound.volume = 0.3;

        const handleMouseOver = (e) => {
          if (e.target.closest('button') || e.target.closest('.glass-card') || e.target.closest('a')) {
            hoverSound.currentTime = 0;
            hoverSound.play().catch(() => {});
          }
        };

        const handleClick = (e) => {
          if (e.target.closest('button') || e.target.closest('.glass-card') || e.target.closest('a')) {
            clickSound.currentTime = 0;
            clickSound.play().catch(() => {});
          }
        };

        document.addEventListener('mouseover', handleMouseOver);
        document.addEventListener('click', handleClick);

        return () => {
          document.removeEventListener('mouseover', handleMouseOver);
          document.removeEventListener('click', handleClick);
        };
      }, []);

      const handlePageChange = (page) => {
        if (page === currentPage) return;
        
        setCurrentPage(page);

        // Play swoosh immediately
        swooshSound.currentTime = 0;
        swooshSound.volume = 0.5;
        swooshSound.play().catch(e => console.log('Audio auto-play blocked:', e));

        // Stop all other activity sounds
        Object.values(activitySounds).forEach(sound => {
          sound.pause();
          sound.currentTime = 0;
          sound.onended = null;
        });

        const pauseBgPages = ['about', 'extras', 'resume', 'games'];

        // Resume bg music if navigating away from a page that paused it
        if (!pauseBgPages.includes(page) && audioRef.current && audioRef.current.paused) {
          audioRef.current.play().catch(e => console.log('Audio auto-play blocked:', e));
        }

        // Play activity sound
        const activity = activitySounds[page];
        if (activity) {
          if (page === 'resume') {
            const crash = activitySounds['resume_crash'];
            crash.currentTime = 0;
            crash.volume = 0.5;
            
            if (audioRef.current) audioRef.current.pause();
            
            crash.onended = () => {
              activity.currentTime = 0;
              activity.volume = 0.5;
              activity.onended = () => {
                if (audioRef.current) audioRef.current.play().catch(e => console.log('Audio auto-play blocked:', e));
              };
              activity.play().catch(e => console.log('Audio auto-play blocked:', e));
            };
            
            crash.play().catch(e => console.log('Audio auto-play blocked:', e));
          } else {
            activity.currentTime = 0;
            activity.volume = 0.5;
            
            if (pauseBgPages.includes(page) && audioRef.current) {
              audioRef.current.pause();
              activity.onended = () => {
                if (audioRef.current) audioRef.current.play().catch(e => console.log('Audio auto-play blocked:', e));
              };
            }
            
            activity.play().catch(e => console.log('Audio auto-play blocked:', e));
          }
        }
      };

      // Scroll to top on page change
      React.useEffect(() => {
        window.scrollTo(0, 0);
      }, [currentPage]);

      return (
        <div className="selection:bg-primary selection:text-black flex flex-col min-h-screen">
          <audio 
            ref={audioRef} 
            src="./Grand-Theft-Auto-San-Andreas-Theme-Song.mp3" 
            loop 
            autoPlay 
            onPlay={() => setIsMusicPlaying(true)}
            onPause={() => setIsMusicPlaying(false)}
          />
          <BackgroundSlideshow />
          <div className="gta-overlay"></div>
          <Navbar currentPage={currentPage} setCurrentPage={handlePageChange} />
          
          <main className="flex-grow pt-28 pb-20">
            <AnimatePresence mode="wait">
              {currentPage === 'home' && (
                <motion.div key="home" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} transition={{ duration: 0.3 }}>
                  <Hero setCurrentPage={handlePageChange} />
                </motion.div>
              )}
              {currentPage === 'about' && (
                <motion.div key="about" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} transition={{ duration: 0.3 }}>
                  <About />
                </motion.div>
              )}
              {currentPage === 'games' && (
                <motion.div key="games" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} transition={{ duration: 0.3 }}>
                  <Games 
                    onVideoModalOpen={() => {
                      if (audioRef.current) audioRef.current.pause();
                      Object.values(activitySounds).forEach(s => { s.pause(); s.onended = null; });
                    }} 
                    onVideoModalClose={() => {
                      if (audioRef.current) audioRef.current.play().catch(()=>{});
                    }} 
                  />
                </motion.div>
              )}
              {currentPage === 'extras' && (
                <motion.div key="extras" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} transition={{ duration: 0.3 }}>
                  <Extras />
                </motion.div>
              )}
              {currentPage === 'resume' && (
                <motion.div key="resume" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} transition={{ duration: 0.3 }}>
                  <Resume />
                </motion.div>
              )}
            </AnimatePresence>
          </main>
          
          <button 
            onClick={() => {
              if (audioRef.current) {
                if (audioRef.current.paused) {
                  audioRef.current.play().catch(()=>{});
                } else {
                  audioRef.current.pause();
                }
              }
            }}
            className="fixed bottom-8 right-8 z-[100] glass-panel p-4 rounded-full text-white/50 hover:text-primary hover:border-primary/50 transition-all hover:scale-110 shadow-[0_0_15px_rgba(0,240,255,0.2)]"
          >
            {isMusicPlaying ? <Volume2 size={24} /> : <VolumeX size={24} />}
          </button>

          <Footer />
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
